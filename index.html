<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Swim Coach AI — Stroke Video Analyzer</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<!-- TensorFlow.js + MoveNet (pose overlay) is loaded lazily on demand — see loadPoseLibs() -->


<style>
  :root{
    --bg:#070d18; --panel:#101b2e; --panel2:#0c1525; --panel3:#0a1220;
    --ink:#eaf1fb; --muted:#9bacc7; --faint:#6c7c97;
    --line:#1f2f48; --line2:#2a3d5c;
    --accent:#3aa9ff; --accent2:#22d3c0; --grad:linear-gradient(135deg,#3aa9ff,#22d3c0);
    --warn:#ffba49; --good:#36d67a; --dev:#3aa9ff; --needs:#ff7a8a; --na:#7d8ba5;
    --shadow:0 14px 40px rgba(0,0,0,.45); --shadow2:0 4px 14px rgba(0,0,0,.3);
    --r:16px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:
      radial-gradient(900px 500px at 85% -5%,rgba(34,211,192,.10),transparent 60%),
      radial-gradient(900px 500px at 10% 0%,rgba(58,169,255,.12),transparent 55%),
      linear-gradient(180deg,#070d18,#060a12);
    color:var(--ink);font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;min-height:100vh}
  .wrap{max-width:1200px;margin:0 auto;padding:26px 20px 90px}

  /* header + stepper */
  .topbar{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:14px}
  .logo{width:46px;height:46px;border-radius:13px;background:var(--grad);display:grid;place-items:center;font-size:24px;box-shadow:var(--shadow2)}
  h1{font-size:27px;margin:0;letter-spacing:-.3px}
  .sub{color:var(--muted);margin:3px 0 0;font-size:14px}
  .stepper{position:relative;background:rgba(8,13,24,.5);
    border:1px solid var(--line);border-radius:14px;padding:8px;margin:6px 0 18px;display:flex;flex-direction:column;gap:4px}
  .snode{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:.15s;white-space:nowrap}
  .snode:hover{background:rgba(255,255,255,.04)}
  .snode.active{background:rgba(58,169,255,.13);box-shadow:inset 0 0 0 1px rgba(58,169,255,.4)}
  .snode .dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:800;
    background:var(--panel2);border:1px solid var(--line2);color:var(--muted);flex:0 0 auto}
  .snode.done .dot{background:var(--grad);color:#04121f;border:none}
  .snode.active .dot{box-shadow:0 0 0 3px rgba(58,169,255,.25)}
  .snode .lbl{font-size:12.5px;color:var(--muted)} .snode.active .lbl,.snode.done .lbl{color:var(--ink)}
  .snode.active{box-shadow:inset 0 0 0 1px rgba(58,169,255,.4),0 4px 14px rgba(0,0,0,.18)}

  /* two-column layout: step rail (left) parallel to the workflow (right) */
  .layout{display:flex;gap:22px;align-items:flex-start}
  .rail{position:sticky;top:14px;flex:0 0 196px;width:196px;z-index:20}
  .main{flex:1;min-width:0}
  .raillabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:2px 0 8px 8px}
  .rail .stepper{margin:0}
  @media(max-width:880px){
    .layout{flex-direction:column;gap:8px}
    .rail{position:static;width:auto;flex:none}
    .raillabel{display:none}
    .rail .stepper{flex-direction:row;overflow-x:auto}
    .rail .snode{flex:1;min-width:92px;justify-content:center;white-space:nowrap}
  }

  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--r);
    padding:18px 18px;margin:16px 0;box-shadow:var(--shadow);scroll-margin-top:84px}
  .card h2{font-size:16px;margin:0 0 14px;display:flex;align-items:center;gap:10px}
  .stepn{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:8px;background:var(--grad);color:#04121f;font-weight:800;font-size:12px}
  .stepn.idle{background:var(--panel3);color:var(--muted);border:1px solid var(--line2)}
  .ctitle-r{margin-left:auto;font-size:12px;color:var(--faint);font-weight:500}

  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:760px){.g2,.g3{grid-template-columns:1fr}}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600;letter-spacing:.2px}
  input[type=text],input[type=number],select,textarea{width:100%;background:var(--panel3);border:1px solid var(--line2);
    color:var(--ink);border-radius:10px;padding:10px 12px;font:inherit;transition:.15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(58,169,255,.18)}
  textarea{min-height:66px;resize:vertical}
  .btn{appearance:none;border:1px solid var(--line2);background:var(--panel3);color:var(--ink);border-radius:11px;
    padding:11px 16px;font:inherit;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
  .btn:hover:not(:disabled){border-color:var(--accent);transform:translateY(-1px)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.primary{background:var(--grad);color:#04121f;border:none;font-weight:800;box-shadow:0 6px 18px rgba(34,211,192,.25)}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
  .btn.ghost{background:transparent}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .hint{color:var(--muted);font-size:12.5px}
  .hintbox{background:rgba(58,169,255,.07);border:1px solid rgba(58,169,255,.22);border-radius:11px;padding:11px 13px;font-size:13px;color:#cfe4ff}

  /* dropzone */
  .drop{border:2px dashed var(--line2);border-radius:14px;padding:30px 18px;text-align:center;transition:.15s;cursor:pointer;background:var(--panel3)}
  .drop:hover,.drop.over{border-color:var(--accent);background:rgba(58,169,255,.06)}
  .drop .big{font-size:34px;margin-bottom:6px}
  .drop input{display:none}

  .video-stage{position:relative;background:#000;border-radius:13px;overflow:hidden;border:1px solid var(--line)}
  .video-stage video{display:block;width:100%;max-height:360px;object-fit:contain;background:#000}

  /* filmstrip */
  .filmstrip{display:flex;gap:10px;overflow-x:auto;padding:6px 2px 12px;scrollbar-width:thin}
  .frame{position:relative;flex:0 0 auto;width:152px;border-radius:11px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:#000;transition:.12s}
  .frame:hover{transform:translateY(-2px)}
  .frame img{display:block;width:152px;height:auto}
  .frame.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(58,169,255,.3)}
  .tag{position:absolute;font-size:11px;padding:2px 7px;border-radius:7px;font-weight:700}
  .tag.t{left:6px;bottom:6px;background:rgba(0,0,0,.62)}
  .tag.a{right:6px;top:6px;background:rgba(34,211,192,.9);color:#04121f}
  .tag.p{left:6px;top:6px;background:rgba(58,169,255,.92);color:#04121f;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pick{position:absolute;right:6px;bottom:6px;background:var(--accent);color:#04121f;border-radius:50%;width:22px;height:22px;display:grid;place-items:center;font-size:12px;font-weight:800}

  /* selected-frame phase rows */
  .selrow{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--line);border-radius:11px;background:var(--panel3);margin:8px 0}
  .selrow img{width:72px;border-radius:8px;display:block}
  .selrow .meta{flex:1;min-width:0}
  .selrow select{padding:7px 9px}

  /* chips */
  .chip{display:inline-block;font-size:12px;padding:3px 11px;border-radius:999px;font-weight:700;text-transform:capitalize}
  .chip.strength{background:rgba(54,214,122,.16);color:var(--good);border:1px solid rgba(54,214,122,.4)}
  .chip.developing{background:rgba(58,169,255,.16);color:var(--dev);border:1px solid rgba(58,169,255,.4)}
  .chip.needs{background:rgba(255,122,138,.16);color:var(--needs);border:1px solid rgba(255,122,138,.4)}
  .chip.na{background:rgba(125,139,165,.16);color:var(--na);border:1px solid rgba(125,139,165,.4)}
  .anglechip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:7px;background:rgba(34,211,192,.12);
    color:var(--accent2);border:1px solid rgba(34,211,192,.3);margin:2px 4px 2px 0;font-family:ui-monospace,Menlo,Consolas,monospace}

  .guard{background:rgba(255,186,73,.07);border:1px solid rgba(255,186,73,.28);border-radius:12px;padding:12px 14px;color:#ffe3b0;font-size:13px}
  .filewarn{background:rgba(239,68,68,.13);border:1px solid rgba(239,68,68,.5);border-radius:12px;padding:13px 15px;color:#ffd9d9;font-size:14px;line-height:1.55;margin-bottom:14px}
  body.light .filewarn{color:#8a1c1c;background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.5)}
  .lockscreen{min-height:72vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .lockcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px 24px;width:100%;max-width:340px;box-shadow:var(--shadow)}
  .profsel{background:var(--panel3);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:13px;max-width:170px;flex:0 0 auto}
  .reviewer{position:relative;background:#04121f;border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:200px}
  .reviewer img{max-width:100%;max-height:440px;display:block}
  .rv-tags{position:absolute;top:8px;left:8px;display:flex;gap:6px}
  .rv-time{background:rgba(4,18,31,.82);color:#cfe6ff;font-size:12px;padding:3px 7px;border-radius:6px}
  .rv-phase{background:rgba(58,169,255,.92);color:#04121f;font-size:12px;font-weight:600;padding:3px 7px;border-radius:6px}
  .settings-modal{position:fixed;inset:0;background:rgba(4,12,22,.55);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;padding:38px 16px;z-index:100;overflow:auto}
  .settings-card{max-width:680px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.45)}
  .khub-sum{cursor:pointer;font-weight:700;font-size:15px;list-style:none}
  .khub-sum::-webkit-details-marker{display:none}
  .tabbar{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .ktab{background:var(--panel3);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:7px 13px;font-size:13px;cursor:pointer}
  .ktab.on{background:var(--accent);color:#04121f;border-color:var(--accent);font-weight:600}
  .err{background:rgba(255,90,110,.1);border:1px solid rgba(255,90,110,.4);color:#ffb9c2;border-radius:11px;padding:12px 14px;font-size:13px;white-space:pre-wrap}

  /* report */
  .report-head{background:var(--grad);border-radius:var(--r);padding:20px 20px;color:#04121f;box-shadow:var(--shadow)}
  .report-head h2{margin:0;font-size:22px;color:#04121f}
  .report-head p{margin:8px 0 0;font-size:15px;color:#06222b;font-weight:500}
  .dim{border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:10px 0;background:var(--panel3)}
  .dim h4{margin:0 0 5px;font-size:14px;display:flex;justify-content:space-between;gap:10px;align-items:center}
  .prio{border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;padding:13px 15px;margin:10px 0;background:var(--panel3)}
  .drill{background:#0a1322;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin:7px 0;font-size:13.5px}
  .drillmeta{margin-top:4px;font-size:12.5px;color:var(--muted)}
  .drillmeta b{color:var(--ink)}
  .cue{background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.35);border-radius:9px;padding:7px 11px;margin:6px 0;font-size:13px;font-style:italic}
  .onething{margin-top:12px;background:rgba(250,204,21,.12);border:1px solid rgba(250,204,21,.4);border-radius:11px;padding:11px 14px;font-size:14px}
  .onething-tag{display:inline-block;font-weight:700;font-style:normal;margin-right:6px}
  .review{display:grid;grid-template-columns:200px 1fr;gap:14px;border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;background:var(--panel3);align-items:start}
  @media(max-width:680px){.review{grid-template-columns:1fr}}
  .review img{width:100%;border-radius:9px;display:block}
  table.sessions{width:100%;border-collapse:collapse;font-size:13px}
  table.sessions th,table.sessions td{border:1px solid var(--line);padding:8px 10px;text-align:left}
  table.sessions th{background:var(--panel3);color:var(--muted);font-weight:600}
  @media(max-width:600px){
    table.cardify,table.cardify tbody,table.cardify tr,table.cardify td{display:block;width:100%}
    table.cardify thead{display:none}
    table.cardify tr{border:1px solid var(--line);border-radius:12px;margin:0 0 10px;padding:8px 12px;background:var(--panel3)}
    table.cardify td{border:none;padding:4px 0;display:flex;justify-content:space-between;gap:14px;text-align:right;font-size:13px}
    table.cardify td::before{content:attr(data-label);color:var(--muted);font-weight:600;text-align:left;flex:0 0 auto}
    table.cardify td:first-child{font-weight:700;font-size:14px;border-bottom:1px solid var(--line);padding-bottom:7px;margin-bottom:4px;display:block;text-align:left}
    table.cardify td:first-child::before{content:""}
  }

  .spinner{width:16px;height:16px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .skeleton{height:14px;border-radius:7px;background:linear-gradient(90deg,#16243a,#1d2f49,#16243a);background-size:200% 100%;animation:sh 1.3s infinite;margin:8px 0}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .progbar{height:8px;border-radius:6px;background:var(--panel3);overflow:hidden;border:1px solid var(--line)}
  .progbar > i{display:block;height:100%;background:var(--grad);transition:width .2s}
  .muted{color:var(--muted)} hr{border:none;border-top:1px solid var(--line);margin:14px 0}
  .stage-msg{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink);margin-top:8px}

  /* ---- light theme (toggle) ---- */
  body.light{
    --panel:#ffffff;--panel2:#f6f9fc;--panel3:#eef3f9;
    --ink:#10192a;--muted:#55647e;--faint:#8694aa;
    --line:#dce3ee;--line2:#c6d1e0;
    --good:#1a9d57;--dev:#2a7fd0;--needs:#d6455f;--na:#6b7890;--warn:#b07916;
    --shadow:0 10px 28px rgba(30,55,100,.10);--shadow2:0 4px 14px rgba(30,55,100,.08);
    background:#e9eff7;color:var(--ink);
  }
  body.light .stepper{background:rgba(255,255,255,.82)}
  body.light .drill{background:#f0f4f9}
  body.light .kbd{background:#eef3f9;color:#10192a}
  body.light .spinner{border-color:rgba(0,0,0,.2);border-top-color:#10192a}
  body.light .guard{color:#6e4e0c;background:rgba(255,186,73,.16);border-color:rgba(176,121,26,.45)}
  body.light .hintbox{color:#1c4e80;background:rgba(58,169,255,.10);border-color:rgba(42,127,208,.35)}
  body.light .err{color:#a01726;background:rgba(214,69,95,.10);border-color:rgba(214,69,95,.4)}
  .wrap.big{zoom:1.18}
  details.sect>summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
  details.sect>summary::-webkit-details-marker{display:none}
  details.sect .chev{margin-left:auto;transition:transform .15s;color:var(--muted)}
  details.sect[open]>summary .chev{transform:rotate(180deg)}
  details.sect .sect-body{margin-top:12px}
  @media(max-width:560px){
    .wrap{padding:16px 12px 70px}
    h1{font-size:21px} .sub{font-size:13px}
    .frame,.frame img{width:122px}
    .report-head h2{font-size:18px}
    .review img{max-height:200px}
    .topbar{gap:8px} .topbar h1{font-size:19px} .sub{display:none}
    .profsel{max-width:44vw}
    table.sessions{font-size:12px}
    table.sessions th,table.sessions td{padding:6px 7px}
    .settings-modal{padding:12px 8px}
    .card{padding:15px 14px}
  }
  @media print{
    @page{margin:12mm}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    body{background:#fff;color:#000} .noprint{display:none!important}
    .wrap{max-width:none;padding:0}
    .topbar{margin-bottom:4px} .logo{box-shadow:none}
    .card{box-shadow:none;border:1px solid #ccc;background:#fff;color:#000;margin:8px 0;padding:10px 12px;break-inside:avoid;page-break-inside:avoid}
    .card h2{font-size:14px;margin:0 0 8px}
    .dim,.prio,.drill,.review{background:#fff;border-color:#ccc;break-inside:avoid;page-break-inside:avoid;margin:6px 0}
    .cue{background:#eef7ff;border:1px solid #b9ddf5;color:#000;break-inside:avoid}
    .onething{background:#fffbe6;border:1px solid #ecd98a;color:#000;break-inside:avoid}
    .drillmeta,.drillmeta b{color:#222}
    .report-head{background:#eef6ff;color:#000;break-inside:avoid} .report-head h2{font-size:18px} .report-head h2,.report-head p{color:#000}
    .chip{border:1px solid #999} .review img{max-height:120px;width:auto}
    details.sect .sect-body{display:block!important} details.sect .chev{display:none}
    h1{font-size:20px} p,.dim div,.drill{font-size:11.5px}
  }
</style>
</head>
<body>
<div id="root"></div>
<video id="scratchVideo" style="display:none" muted playsinline crossorigin="anonymous"></video>
<canvas id="scratchCanvas" style="display:none"></canvas>

<!-- plain-JS diagnostic bootstrap: turns a silent blank page into a clear message -->
<script>
(function(){
  function show(title,msg,extra){
    var r=document.getElementById('root'); if(!r) return;
    r.innerHTML='<div style="max-width:700px;margin:48px auto;padding:22px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;'
      +'color:#eaf1fb;background:#101b2e;border:1px solid #2a3d5c;border-radius:14px;line-height:1.55">'
      +'<h2 style="margin:0 0 8px">🏊 Swim Coach AI couldn’t start</h2>'
      +'<p style="color:#ffb9c2;margin:0 0 10px">'+title+'</p>'
      +(msg?'<pre style="white-space:pre-wrap;color:#9bacc7;font-size:12.5px;background:#0a1220;padding:10px;border-radius:8px;border:1px solid #1f2f48;overflow:auto">'+msg+'</pre>':'')
      +(extra||'')+'</div>';
  }
  window.__swimlensShow=show;
  function mounted(){var r=document.getElementById('root');return r&&r.querySelector('.wrap');}
  window.addEventListener('error',function(e){
    var info=((e.error&&e.error.stack)||e.message||'')+(e.filename?('\n'+e.filename+':'+e.lineno):'');
    if(mounted()){console.error('Swim Coach AI error:',info);return;} // app is running — don't wipe it for a minor error
    show('A script error stopped the app.',info);
  });
  window.addEventListener('unhandledrejection',function(e){
    var info=(e.reason&&(e.reason.stack||e.reason.message))||String(e.reason);
    if(mounted()){console.error('Swim Coach AI background error:',info);return;}
    show('A background task failed.',info);
  });
  window.addEventListener('load',function(){
    setTimeout(function(){
      var r=document.getElementById('root'); if(!r||r.childNodes.length>0) return; // app rendered fine
      var miss=[]; if(typeof React==='undefined')miss.push('React'); if(typeof ReactDOM==='undefined')miss.push('ReactDOM'); if(typeof Babel==='undefined')miss.push('Babel');
      if(miss.length){
        show('Couldn’t load required libraries: '+miss.join(', ')+'.',
          'These load from the internet (unpkg.com). You appear to be offline, or a network/extension is blocking the CDN.',
          '<p style="color:#9bacc7;font-size:13px;margin:10px 0 0">Fix: connect to the internet and reload, or serve the file from a local server.</p>');
      } else {
        show('Libraries loaded, but the app didn’t render.',
          'This usually means a code error during start-up.',
          '<p style="color:#9bacc7;font-size:13px;margin:10px 0 0">Open the browser console (F12, then the Console tab) and send me the first red error — I’ll fix it.</p>');
      }
    },4500);
  });
})();
</script>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useMemo } = React;
const STATIC_DIRECT = true;

/* ===================== constants ===================== */

function parseTimeToSec(t){
  if(!t) return null; t=String(t).trim();
  if(t.includes(":")){const[m,s]=t.split(":");const mm=parseFloat(m),ss=parseFloat(s);if(isNaN(mm)||isNaN(ss))return null;return mm*60+ss;}
  const v=parseFloat(t);return isNaN(v)?null:v;
}
function fmtSec(s){if(s==null)return"—";const m=Math.floor(s/60),r=(s-m*60);return m>0?`${m}:${r.toFixed(2).padStart(5,"0")}`:r.toFixed(2);}
function angleDeg(a,b,c){if(!a||!b||!c)return null;const v1={x:a.x-b.x,y:a.y-b.y},v2={x:c.x-b.x,y:c.y-b.y};
  const d=v1.x*v2.x+v1.y*v2.y,m1=Math.hypot(v1.x,v1.y),m2=Math.hypot(v2.x,v2.y);if(!m1||!m2)return null;
  let cos=Math.max(-1,Math.min(1,d/(m1*m2)));return Math.round(Math.acos(cos)*180/Math.PI);}
function lineToHorizontal(a,b){if(!a||!b)return null;return Math.round(Math.abs(Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI));}

const GLOSSARY=[
  {term:"Streamline",def:"The tight, pencil-straight shape off every wall — hands stacked, arms squeezing the ears, body long. The lowest-drag position in the pool; the foundation of fast swimming."},
  {term:"Bodyline / drag",def:"How straight and level the body rides. A long, flat line with hips and heels near the surface slips through the water; a bent or head-up line drags. Reducing drag is usually the fastest way to drop time."},
  {term:"EVF — Early Vertical Forearm",def:"A 'high-elbow catch'. The elbow stays high near the surface while the fingertips tip down, so the whole forearm and hand face backward and grip the water early — instead of a dropped elbow that slips."},
  {term:"Catch",def:"The moment at the front of the stroke where the hand and forearm first 'grab' the water before pulling. A good catch sets up the whole pull."},
  {term:"DPS — Distance Per Stroke",def:"How far the swimmer travels per arm stroke. More distance per stroke (fewer strokes per length) means a more efficient stroke. Speed = distance-per-stroke × stroke rate."},
  {term:"Stroke rate / tempo",def:"How fast the arms turn over (strokes per minute). The art is balancing tempo with distance-per-stroke — turning over faster only helps if the stroke still holds water."},
  {term:"Stroke count / SWOLF",def:"Counting strokes per length is a simple efficiency check. SWOLF adds strokes + seconds for a length — a lower number means you're covering the length with less effort."},
  {term:"Front-quadrant timing",def:"In freestyle/backstroke, the lead hand stays out in front until the other arm enters the catch — keeping the body long and reducing dead spots and drag."},
  {term:"Long-axis rotation",def:"Freestyle and backstroke rotate around the spine (the long axis), driven from the hips. Good rotation powers the catch and frees an easy recovery; swimming flat wastes power."},
  {term:"Undulation (short-axis)",def:"Butterfly and breaststroke move in a forward wave started from the chest. It should drive the body forward, not bob it up and down."},
  {term:"Underwater dolphin kick — 'the 5th stroke'",def:"The fast underwater kicking off each wall in a tight streamline. Often the quickest part of a race and the most under-trained — big, easy time gains hide here."},
  {term:"Breakout",def:"The first stroke as the swimmer surfaces after the underwater. A good breakout carries the wall's speed into the swim with no glide or stall."},
  {term:"Pull-out (breaststroke)",def:"The underwater sequence off a breaststroke wall: streamline glide, one full pull to the thighs, one dolphin kick, recover, one breaststroke kick, then break out."},
  {term:"Two-beat / six-beat kick",def:"How many leg kicks happen per arm-stroke cycle. Distance swimmers often use a lighter two-beat kick; sprinters a faster six-beat. It's matched to the event."},
  {term:"External-focus cue",def:"A coaching cue about the effect on the water or space ('press water to the wall behind you') rather than a body part ('bend your elbow'). Research shows these stick better and transfer faster."},
  {term:"Periodization",def:"Building training in phases — e.g. Technique/foundation, then Build, then Sharpen/race-specific — so skills are layered in the right order instead of training everything at once."},
  {term:"Dryland",def:"Training out of the water (mobility, core, bodyweight strength). Supports the stroke and injury-resistance; kept light and playful for young swimmers."},
];

function safeJSON(text){
  let clean=String(text).replace(/```json|```/g,"").trim();
  const a=clean.indexOf("{"),b=clean.lastIndexOf("}");
  const candidate=(a>=0&&b>=0&&b>a)?clean.slice(a,b+1):clean;
  try{ return JSON.parse(candidate); }catch(e){ return looseParseJSON(clean); }
}
/* repair a truncated/loose JSON reply (e.g. response cut off mid-array by the token limit) */
function looseParseJSON(text){
  let s=String(text).replace(/```json|```/g,"").trim();
  const i=s.search(/[\{\[]/); if(i>0)s=s.slice(i);
  try{ return JSON.parse(s); }catch(e){}
  for(let end=s.length; end>1; end--){
    let frag=s.slice(0,end).replace(/[,\s]+$/,"");
    if(!frag)continue;
    let inStr=false,esc=false; const open=[];
    for(let k=0;k<frag.length;k++){const c=frag[k];
      if(inStr){ if(esc)esc=false; else if(c==="\\")esc=true; else if(c==='"')inStr=false; }
      else { if(c==='"')inStr=true; else if(c==="{")open.push("}"); else if(c==="[")open.push("]"); else if(c==="}"||c==="]")open.pop(); }
    }
    let fixed=frag; if(inStr)fixed+='"';
    for(let k=open.length-1;k>=0;k--)fixed+=open[k];
    try{ return JSON.parse(fixed); }catch(_){}
  }
  throw new Error("Could not read the model's reply as JSON.");
}
/* map any model-returned label to the closest allowed phase (tolerant of wording/case) */
function matchPhaseTo(label,allowed){
  if(label==null)return null;
  const norm=s=>String(s).toLowerCase().replace(/[^a-z]+/g," ").trim();
  const L=norm(label); if(!L)return null;
  for(const p of allowed){if(norm(p)===L)return p;}
  for(const p of allowed){const P=norm(p);if(P&&(P.includes(L)||L.includes(P)))return p;}
  const lw=new Set(L.split(" ").filter(Boolean));
  let best=null,score=0;
  for(const p of allowed){const ov=norm(p).split(" ").filter(Boolean).filter(w=>lw.has(w)).length;if(ov>score){score=ov;best=p;}}
  return score>0?best:null;
}

/* ===================== frame extraction ===================== */
async function extractFrames(file,intervalSec,maxWidth,quality,onProgress){
  const video=document.getElementById("scratchVideo"),canvas=document.getElementById("scratchCanvas"),ctx=canvas.getContext("2d");
  const url=URL.createObjectURL(file),frames=[];
  await new Promise((res,rej)=>{video.onloadedmetadata=()=>res();video.onerror=()=>rej(new Error("Could not read this video. Try an MP4 (H.264) or MOV."));video.src=url;});
  const duration=video.duration;if(!isFinite(duration)||duration<=0)throw new Error("Video has no readable duration.");
  const scale=Math.min(1,maxWidth/(video.videoWidth||maxWidth));
  canvas.width=Math.round((video.videoWidth||maxWidth)*scale);canvas.height=Math.round((video.videoHeight||maxWidth*0.56)*scale);
  const times=[];for(let t=0;t<duration;t+=intervalSec)times.push(Math.min(t,Math.max(0,duration-0.05)));
  for(let i=0;i<times.length;i++){
    await new Promise(r=>{const f=()=>{video.removeEventListener("seeked",f);r();};video.addEventListener("seeked",f);video.currentTime=times[i];});
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const d=canvas.toDataURL("image/jpeg",quality);
    frames.push({time:times[i],dataUrl:d,b64:d.split(",")[1]});
    onProgress&&onProgress(Math.round(((i+1)/times.length)*100));
  }
  URL.revokeObjectURL(url);return{frames,duration};
}
async function captureAt(file,t,maxWidth,quality){
  const video=document.getElementById("scratchVideo"),canvas=document.getElementById("scratchCanvas"),ctx=canvas.getContext("2d");
  await new Promise(r=>{const f=()=>{video.removeEventListener("seeked",f);r();};video.addEventListener("seeked",f);video.currentTime=t;});
  const scale=Math.min(1,maxWidth/(video.videoWidth||maxWidth));
  canvas.width=Math.round((video.videoWidth||maxWidth)*scale);canvas.height=Math.round((video.videoHeight||maxWidth*0.56)*scale);
  ctx.drawImage(video,0,0,canvas.width,canvas.height);const d=canvas.toDataURL("image/jpeg",quality);
  return{time:t,dataUrl:d,b64:d.split(",")[1]};

async function runPose(frame){

/* heuristic freestyle phase from a single pose (rough; user can correct) */
function classifyPhase(kpd,stroke){
  if(!kpd||!kpd.kp)return null;
  const kp=kpd.kp,W=kpd.W||1,H=kpd.H||1;
  const mid=(a,b)=>a&&b?{x:(a.x+b.x)/2,y:(a.y+b.y)/2}:(a||b);
  const sh=mid(kp.left_shoulder,kp.right_shoulder),hip=mid(kp.left_hip,kp.right_hip),nose=kp.nose||mid(kp.left_eye,kp.right_eye);
  if(!sh||!hip)return null;
  const fwd=Math.sign(((nose?nose.x:sh.x)-hip.x))||1;
  const U=p=>p?(p.x-sh.x)*fwd:null;
  const wrists=[kp.left_wrist,kp.right_wrist].filter(Boolean);
  const elbows=[kp.left_elbow,kp.right_elbow].filter(Boolean);
  const ankles=[kp.left_ankle,kp.right_ankle].filter(Boolean);
  const bothWrists=wrists.length===2;
  const headUp=nose&&(sh.y-nose.y)>0.06*H;
  const aboveSh=wrists.filter(w=>(sh.y-w.y)>0.05*H);   // wrists above the shoulder line
  const kneeBent=(function(){const a=[angleDeg(kp.left_hip,kp.left_knee,kp.left_ankle),angleDeg(kp.right_hip,kp.right_knee,kp.right_ankle)].filter(v=>v!=null);return a.length?Math.min.apply(null,a)<130:false;})();
  const wristsTogether=bothWrists&&Math.hypot(wrists[0].x-wrists[1].x,wrists[0].y-wrists[1].y)<0.16*W;
  // --- non-freestyle strokes (rough heuristics; AI auto-label is the accurate path) ---
  if(stroke==="backstroke"){
    if(aboveSh.length>=1)return "Recovery";
    const tilt=(kp.left_shoulder&&kp.right_shoulder)?Math.abs(kp.left_shoulder.y-kp.right_shoulder.y):0;
    if(tilt>0.06*H)return "Rotation";
    if(kneeBent)return "Kick";
    if(wrists.some(w=>Math.abs(w.x-sh.x)>0.18*W))return "Catch";
    return "Body line";
  }
  if(stroke==="breaststroke"){
    if(headUp)return "Head / breath";
    if(kneeBent&&ankles.length)return "Kick";
    if(bothWrists&&Math.abs(wrists[0].x-wrists[1].x)>0.28*W)return "Pull";
    if(wristsTogether)return "Streamline / glide";
    return "Timing";
  }
  if(stroke==="butterfly"){
    if(aboveSh.length>=2)return "Recovery";
    if(headUp)return "Breath";
    if(kneeBent)return "Kick";
    if(bothWrists&&wrists.every(w=>(w.y-sh.y)>0.02*H))return "Catch";
    return "Body wave";
  }
  // breath: head clearly above the shoulder line
  if(nose&&(sh.y-nose.y)>0.10*H)return "Breath";
  if(!wrists.length)return null;
  let lead=wrists[0];wrists.forEach(w=>{if(U(w)>U(lead))lead=w;});
  const trail=wrists.find(w=>w!==lead);
  const uLead=U(lead);
  // push-off / streamline: both wrists far ahead, close together, body flat
  if(wrists.length===2){
    const both=wrists.every(w=>U(w)>0.18*W);
    const close=Math.hypot(wrists[0].x-wrists[1].x,wrists[0].y-wrists[1].y)<0.12*W;
    const flat=Math.abs(sh.y-hip.y)<0.10*H;
    if(both&&close&&flat)return "Push-off / breakout";
  }
  // recovery: other arm high (above shoulders) and behind
  if(trail&&(sh.y-trail.y)>0.04*H&&U(trail)<0)return "Recovery";
  // entry: leading wrist well ahead, near/above shoulder height
  if(uLead>0.16*W&&(lead.y-sh.y)<0.06*H)return "Hand entry";
  // catch: leading wrist ahead, below shoulder, elbow above wrist (high elbow)
  const leadElbow=elbows.length?elbows.reduce((a,b)=>U(b)>U(a)?b:a):null;
  if(uLead>0.04*W&&(lead.y-sh.y)>0.02*H&&leadElbow&&leadElbow.y<lead.y)return "Catch / early forearm";
  // mid-pull: wrist under torso and low
  if(uLead<=0.06*W&&uLead>-0.10*W&&(lead.y-sh.y)>0.05*H)return "Mid-pull";
  return "Mid-pull";
}

function getMultiDetector(){if(!multiDetectorPromise){multiDetectorPromise=(async()=>{await loadPoseLibs();await tf.setBackend("webgl");await tf.ready();

function boxFromKeypoints(kps){
  const pts=(kps||[]).filter(k=>k.score>0.3);

function cropNorm(frame,r,q){
  return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{
    const W=img.naturalWidth,H=img.naturalHeight;
    let x=Math.round(r.x*W),y=Math.round(r.y*H),w=Math.round(r.w*W),h=Math.round(r.h*H);
    x=Math.max(0,Math.min(W-1,x));y=Math.max(0,Math.min(H-1,y));w=Math.max(1,Math.min(W-x,w));h=Math.max(1,Math.min(H-y,h));
    const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,x,y,w,h,0,0,w,h);

function boxToPaddedNorm(b,W,H,pad){
  const bw=b.xMax-b.xMin,bh=b.yMax-b.yMin;

/* ===================== Claude calls (via local launcher proxy) ===================== */
/* The request goes to the local helper at /api/analyze, which adds the API key
   server-side and forwards to Anthropic — so there is no CORS / file:// problem. */
async function postClaude(body,apiKey){
  let res;
  if(STATIC_DIRECT){
    res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":(apiKey||"").trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify(body)});
  } else {
    try{
      res=await fetch("/api/analyze",{method:"POST",
        headers:{"Content-Type":"application/json",...(apiKey&&apiKey.trim()?{"x-swimlens-key":apiKey.trim()}:{})},
        body:JSON.stringify(body)});
    }catch(e){
      throw new Error("Couldn't reach the analysis service. Check your internet connection.");
    }
  }
  if(!res.ok){let d="";try{d=JSON.stringify(await res.json());}catch(e){d=await res.text().catch(()=>"");}
    throw new Error("Claude API returned "+res.status+".\n"+d+(res.status===401?"\n\nTip: add a valid Anthropic API key in the key box above and Save it.":""));}
  const data=await res.json();return(data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("\n");
}

  async function runMotionAnalysis(){

      if(tracked){ dense=trackedCrops; crop=null; base=0; span=100; }       // already cropped to the tracked swimmer
      else { const ex=await extractFrames(file,0.12,512,0.6,p=>setCvPct(Math.round(p*0.45))); dense=ex.frames; crop=(focusMode==="box"&&boxRect)?boxRect:null; base=45; span=55; }
      const cap=Math.min(dense.length,240);
      const CONF=0.35;
      const times=[],bL=[],eL=[],eR=[],kn=[],wr=[],an=[],hd=[],ph=[]; let usable=0;
      const usingYolo=tracked&&dense.some(d=>d.kpts&&d.kpts.length);
      for(let i=0;i<cap;i++){
        const m=(dense[i].kpts&&dense[i].kpts.length)?metricsFromKpts(dense[i].kpts,meta.stroke):await poseSeriesFrame(dense[i].dataUrl,crop,meta.stroke);
        const good=!!(m&&m.conf>=CONF&&m.nkp>=6);   // drop low-confidence frames so metrics stay trustworthy
        if(good)usable++;
        times.push(+dense[i].time.toFixed(2));
        bL.push(good?m.bodyLine:null);eL.push(good?m.elbowL:null);eR.push(good?m.elbowR:null);kn.push(good?m.knee:null);
        wr.push(good&&m.wristTopY!=null?100-m.wristTopY:null);an.push(good?m.ankleY:null);
        hd.push(good?m.headRel:null);ph.push(good?m.phase:null);
        setCvPct(base+Math.round((i+1)/cap*span));
      }
      const dur=times.length?times[times.length-1]-times[0]:0;
      const coverage=cap?Math.round(usable/cap*100):0;
      const lowConf=usable<8||coverage<50;
      const strokes=countPeaks(smooth(wr,1),times),kicks=countPeaks(smooth(an,1),times);
      const breaths=countPeaks(smooth(hd,1),times),sym=symmetryOf(eL,eR);
      const elbowAvg=eL.map((v,i)=>v!=null&&eR[i]!=null?Math.round((v+eR[i])/2):(v!=null?v:eR[i]));
      const catchVals=[];ph.forEach((p,i)=>{if(p==="Catch / early forearm"&&elbowAvg[i]!=null)catchVals.push(elbowAvg[i]);});
      const catchElbow=catchVals.length?Math.round(catchVals.reduce((a,b)=>a+b,0)/catchVals.length):null;
      // smooth the displayed time-series so charts aren't jittery (accuracy/trust)
      setCvResult({times:times,bodyLine:smooth(bL,1),elbow:smooth(elbowAvg,1),knee:kn,head:smooth(hd,1),phases:ph,duration:dur,
        summary:{bodyLine:statsOf(bL),elbow:statsOf(eL.concat(eR)),knee:statsOf(kn),headLift:statsOf(hd),
          strokeRate:strokes.perMin,strokeCount:strokes.count,kickRate:kicks.perMin,kickCount:kicks.count,
          breathCount:breaths.count,breathRate:breaths.perMin,catchElbow:catchElbow,symmetry:sym,
          frames:cap,usable:usable,coverage:coverage,lowConfidence:lowConf,cropped:!!crop,poseModel:usingYolo?"YOLO11-pose":"MoveNet Thunder"}});
