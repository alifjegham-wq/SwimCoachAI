    <div className={"wrap"+(bigText?" big":"")}>
      <div className="topbar">
        <div className="logo">🏊</div>
        <div style={{flex:1}}>
          <h1>Swim Coach AI</h1>
          <div className="sub">Upload a short clip → pick key frames → get an age-appropriate AI stroke report.</div>
        </div>
        <select className="profsel noprint" value={activeProfile||""} title="Swimmer profile"
          onChange={e=>{ if(e.target.value==="__new")saveCurrentAsProfile(); else switchProfile(e.target.value); }}>
          <option value="">All swimmers</option>
          {profiles.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          <option value="__new">+ Save current as profile</option>
        </select>
        <button className="btn sm ghost noprint" title="Settings" onClick={()=>setShowSettings(true)} style={{flex:"0 0 auto"}}>⚙</button>
        <button className="btn sm ghost noprint" title="Light / dark theme" onClick={()=>setTheme(t=>t==="light"?"dark":"light")} style={{flex:"0 0 auto"}}>{theme==="light"?"🌙":"☀️"}</button>
        <button className="btn sm ghost noprint" title="Larger text" onClick={()=>setBigText(v=>!v)} style={{flex:"0 0 auto"}}>{bigText?"A−":"A+"}</button>
      </div>

      {/* two-column layout: sticky step rail on the left, workflow on the right */}
      <div className="layout">
      <aside className="rail noprint">
        <div className="raillabel">Workflow</div>
        <div className="stepper">
          {STEPS.map((s,i)=>{
            const cls=i<stepIdx?"done":i===stepIdx?"active":"";
            return <div key={s.k} className={"snode "+cls} onClick={()=>document.getElementById("card-"+s.k)?.scrollIntoView({behavior:"smooth"})}>
              <span className="dot">{i<stepIdx?"✓":i+1}</span><span className="lbl">{s.label}</span></div>;
          })}
        </div>
      </aside>
      <div className="main">

      {location.protocol==="file:" &&
        <div className="filewarn noprint">
          <b>⚠ The app was opened the wrong way.</b> You're viewing the file directly, so it can't reach its local helper — your API key won't save and analysis won't run.
          <br/>Close this tab and launch with <b>Swim Coach AI</b> (the desktop icon, or <span className="kbd">Swim Coach AI.bat</span>). It opens the correct tab at <b>http://127.0.0.1:8765</b>.
        </div>}

      <div className="guard noprint">
        Analysis is built from a handful of <b>still frames</b>, not motion — confirm timing-based issues with a live coach.
        Your <b>video never leaves the browser</b>; only a few small stills are sent. Guidance is age-appropriate and aimed at enjoyment and long-term development.
      </div>

      {/* settings (separate panel; only mounts when opened) */}
      {showSettings &&
      <div className="settings-modal noprint" onClick={e=>{if(e.target===e.currentTarget)setShowSettings(false);}}>
      <div className="card settings-card" id="card-settings">
        <div className="row" style={{justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <h2 style={{margin:0}}><span className="stepn idle">⚙</span>Settings</h2>
          <button className="btn sm ghost" onClick={()=>setShowSettings(false)}>✕ Close</button>
        </div>
        {profMsg && <div className="hint" style={{marginBottom:8}}>{profMsg}</div>}
        <label>Anthropic API key</label>
        {keySaved && !editKey ?
          <div className="row">
            <span className="chip strength">✓ API key saved</span>
            <button className="btn sm ghost" onClick={()=>{setEditKey(true);setApiKey("");setKeyMsg("");}}>Change key</button>
          </div>
          :
          <div className="row">
            <input type="password" placeholder="sk-ant-…" value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{flex:1,minWidth:180}} />
            <button className="btn primary sm" disabled={!apiKey.trim()} onClick={saveKey}>Save key</button>
            {keySaved && <button className="btn sm ghost" onClick={()=>{setEditKey(false);setKeyMsg("");}}>Cancel</button>}
          </div>}
        {keyMsg && <div className="hint" style={{marginTop:6}}>{keyMsg}</div>}
        <div className="hint" style={{marginTop:6}}>{hosted?"Stored only in this browser and sent with each request to Anthropic through the site's proxy — never saved on the server.":"Saved to a config file next to the app (swimlens_config.json). The local helper sends it only to Anthropic — nowhere else."} Get a key at console.anthropic.com → API keys.</div>
        <div style={{marginTop:12,borderTop:"1px solid var(--line)",paddingTop:10}}>
          <label>Model (used for analysis, coaching plan & AI auto-label)</label>
          <div className="row">
            <input type="text" value={model} onChange={e=>setModel(e.target.value)} style={{flex:1,minWidth:180}} />
            <button className="btn sm" onClick={()=>setModel("claude-opus-4-8")}>Opus 4.8</button>
            <button className="btn sm" onClick={()=>setModel("claude-sonnet-4-6")}>Sonnet 4.6</button>
            <button className="btn sm" onClick={()=>setModel("claude-haiku-4-5-20251001")}>Haiku 4.5</button>
          </div>
          <div className="hint" style={{marginTop:6}}>The exact model string matters. The current Opus is <span className="kbd">claude-opus-4-8</span> (there is no public “4.7”). Opus = most capable; Sonnet = faster/cheaper; Haiku = fastest. An invalid string will return a 404 from the API.</div>
        </div>
        {hosted && accounts &&
        <div style={{marginTop:14,borderTop:"1px solid var(--line)",paddingTop:12}}>
          <label>Account {user?<span className="chip strength" style={{fontSize:11}}>{user.email}</span>:<span className="chip" style={{fontSize:11}}>signed out</span>}</label>
          {user
            ? <div className="row" style={{marginTop:4}}><span className="muted" style={{fontSize:13}}>Your swimmers &amp; progress sync to this account across devices.</span><button className="btn sm ghost" style={{marginLeft:"auto"}} onClick={doLogout}>Sign out</button></div>
            : <div style={{marginTop:4}}>
                <div className="row">
                  <button className={"btn sm"+(authMode==="login"?" primary":"")} onClick={()=>setAuthMode("login")}>Sign in</button>
                  <button className={"btn sm"+(authMode==="signup"?" primary":"")} onClick={()=>setAuthMode("signup")}>Create account</button>
                </div>
                <div className="row" style={{marginTop:6}}>
                  <input type="email" placeholder="email" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} style={{maxWidth:220}} />
                  <input type="password" placeholder="password (8+ chars)" value={authPass} onChange={e=>setAuthPass(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")doAuth();}} style={{maxWidth:180}} />
                  <button className="btn sm primary" disabled={!authEmail||!authPass} onClick={doAuth}>{authMode==="signup"?"Create":"Sign in"}</button>
                </div>
                {authMsg && <div className="hint" style={{marginTop:6}}>{authMsg}</div>}
              </div>}
          <div className="hint" style={{marginTop:6}}>Optional. Sign in to sync your swimmers and progress across devices. Your Anthropic API key always stays only in this browser.</div>
        </div>}
        {!hosted &&
        <div style={{marginTop:14,borderTop:"1px solid var(--line)",paddingTop:12}}>
          <label>Passcode lock {hasPasscode?<span className="chip strength" style={{fontSize:11}}>on</span>:<span className="chip" style={{fontSize:11}}>off</span>}</label>
          <PasscodeControls hasPasscode={hasPasscode} onSet={setPasscode} onClear={clearPasscode} />
          <div className="hint" style={{marginTop:6}}>Optional. Protects the saved key and data on a shared computer. It's a local gate sent only to your helper — convenient privacy, not bank-grade security.</div>
        </div>}
        <div style={{marginTop:14,borderTop:"1px solid var(--line)",paddingTop:12}}>
          <label>Appearance & defaults</label>
          <div className="row" style={{marginTop:4}}>
            <button className="btn sm" onClick={()=>setTheme(t=>t==="light"?"dark":"light")}>{theme==="light"?"🌙 Dark":"☀️ Light"} theme</button>
            <button className="btn sm" onClick={()=>setBigText(v=>!v)}>{bigText?"A− Normal":"A+ Large"} text</button>
          </div>
          <div className="grid g2" style={{marginTop:8}}>
            <Field label="Default stroke"><select value={meta.stroke} onChange={e=>set("stroke",e.target.value)}>{STROKES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></Field>
            <Field label="Default pool / course"><select value={meta.course} onChange={e=>set("course",e.target.value)}>{COURSES.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select></Field>
          </div>
        </div>
        <div style={{marginTop:14,borderTop:"1px solid var(--line)",paddingTop:12}}>
          <label>Swimmer profiles {profiles.length>0 && <span className="muted" style={{fontWeight:400,fontSize:12}}>· {profiles.length}</span>}</label>
          <div className="row" style={{marginTop:4}}>
            <button className="btn sm" onClick={saveCurrentAsProfile}>Save current swimmer as profile</button>
          </div>
          {profiles.length>0 &&
            <div style={{marginTop:8}}>
              {profiles.map(p=>(
                <div className="row" key={p.id} style={{justifyContent:"space-between",borderBottom:"1px solid var(--line)",padding:"5px 0"}}>
                  <span style={{fontSize:13.5}}>{p.name} <span className="muted" style={{fontSize:12}}>· age {p.age||"—"} · {STROKES.find(s=>s.id===p.stroke)?.label||p.stroke}</span>{activeProfile===p.id&&<span className="chip strength" style={{fontSize:10,marginLeft:6}}>active</span>}</span>
                  <span className="row" style={{gap:6}}>
                    <button className="btn sm ghost" onClick={()=>switchProfile(p.id)}>Use</button>
                    <button className="btn sm ghost" onClick={()=>deleteProfile(p.id)}>✕</button>
                  </span>
                </div>))}
            </div>}
          <div className="hint" style={{marginTop:6}}>Each profile remembers a swimmer's details and filters their saved progress. Switch swimmers from the selector at the top right.</div>
        </div>
        <div style={{marginTop:14,borderTop:"1px solid var(--line)",paddingTop:12}}>
          <label>Data</label>
          <div className="row" style={{marginTop:4}}>
            <button className="btn sm ghost" onClick={clearHistory}>Clear saved progress history</button>
          </div>
          <div className="hint" style={{marginTop:6}}>Saved next to the app (swimlens_history.json / swimlens_profiles.json), on your computer only.</div>
        </div>
      </div>
      </div>}

      {/* 1 upload */}
      <div className="card noprint" id="card-upload">
        <h2><span className={"stepn"+(file?"":" idle")}>1</span>Upload a clip<span className="ctitle-r">MP4 / MOV · stays on your device</span></h2>
        {!videoUrl ?
          <label className={"drop"+(dragOver?" over":"")} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={onDrop}>
            <div className="big">🎬</div>
            <div><b>Drop a video here</b> or click to choose</div>
            <div className="hint" style={{marginTop:6}}>A single length or a few strokes is plenty.</div>
            <input type="file" accept="video/mp4,video/quicktime,.mp4,.mov,.m4v,.webm" onChange={e=>handleFile(e.target.files&&e.target.files[0])} />
          </label>
          :
          <div>
            <div className="video-stage"><video src={videoUrl} controls onLoadedMetadata={e=>setDuration(e.target.duration||0)} /></div>
            <div className="row" style={{marginTop:10}}>
              <button className="btn sm ghost" onClick={()=>{setFile(null);setVideoUrl(null);setFrames([]);setSelected([]);}}>Choose a different clip</button>
              <span className="hint">{file?.name} · {duration?duration.toFixed(1)+"s":""}</span>
            </div>
          </div>}
      </div>

      {/* 2 details */}
      <div className="card noprint" id="card-details">
        <h2><span className="stepn">2</span>Swimmer details
          <span className="ctitle-r"><button className="btn sm ghost" onClick={()=>setMeta(SAMPLE_META)}>Load sample</button></span></h2>
        <div className="grid g3">
          <Field label="First name"><input type="text" value={meta.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Maya" /></Field>
          <Field label="Age"><input type="number" min="4" max="18" value={meta.age} onChange={e=>set("age",e.target.value)} /></Field>
          <Field label="Sex"><select value={meta.sex} onChange={e=>set("sex",e.target.value)}><option value="female">Female</option><option value="male">Male</option></select></Field>
          <Field label="Level"><select value={meta.level} onChange={e=>set("level",e.target.value)}>{LEVELS.map(l=><option key={l.id} value={l.id}>{l.label}</option>)}</select></Field>
          <Field label="Stroke"><select value={meta.stroke} onChange={e=>set("stroke",e.target.value)}>{STROKES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></Field>
          <Field label="Course (pool)"><select value={meta.course} onChange={e=>set("course",e.target.value)}>{COURSES.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select></Field>
          <Field label="50 time (mm:ss.xx or s)"><input type="text" value={meta.t50} onChange={e=>set("t50",e.target.value)} placeholder="45.30" /></Field>
          <Field label="100 time"><input type="text" value={meta.t100} onChange={e=>set("t100",e.target.value)} placeholder="1:41.32" /></Field>
          <Field label="Splits (optional, per 50)"><input type="text" value={meta.splits} onChange={e=>set("splits",e.target.value)} placeholder="e.g. 47.0 / 54.3" /></Field>
        </div>
        <div style={{marginTop:12}}><Field label="Notes for the coach"><textarea value={meta.notes} onChange={e=>set("notes",e.target.value)} /></Field></div>
        {fadeRatio!=null &&
          <div className="hintbox" style={{marginTop:12}}>
            100 is <b>{fadeRatio.toFixed(2)}×</b> the 50 pace ({fmtSec(t50s)} → {fmtSec(t100s)}).{fadeRatio>1.06?" That's a notable second-50 fade — the report will dig into pacing & endurance.":" Pacing looks fairly even."}
          </div>}
      </div>

      {/* 3 extract */}
      {videoUrl &&
      <div className="card noprint" id="card-frames">
        <h2><span className={"stepn"+(frames.length?"":" idle")}>3</span>Extract & choose frames
          {frames.length>0 && <span className="ctitle-r">{selected.length} selected · up to {MAX_SELECT}</span>}</h2>
        <div className="row">
          <label style={{margin:0}}>Sample every</label>
          <input type="number" step="0.1" min="0.1" max="3" value={intervalS} onChange={e=>setIntervalS(e.target.value)} style={{width:88}} />
          <span className="hint">seconds</span>
          <button className="btn primary" disabled={extracting} onClick={doExtract}>{extracting?<span><span className="spinner"></span> Extracting {extractPct}%</span>:(frames.length?"Re-extract":"Extract frames")}</button>
        </div>
        {extracting && <div className="progbar" style={{marginTop:10}}><i style={{width:extractPct+"%"}}></i></div>}

        {duration>0 &&
          <div className="row" style={{marginTop:12}}>
            <label style={{margin:0}}>Scrub</label>
            <input type="range" min="0" max={duration} step="0.05" value={scrubT} onChange={e=>setScrubT(parseFloat(e.target.value))} style={{flex:1}} />
            <span className="hint" style={{minWidth:48}}>{scrubT.toFixed(2)}s</span>
            <button className="btn sm" onClick={captureScrub}>Capture moment</button>
          </div>}

        {frames.length>0 &&
          <>
            <div className="row" style={{margin:"12px 0 4px"}}>
              <button className="btn sm" disabled={!!labelBusy} onClick={smartPick}>{labelBusy==="smart"?<span><span className="spinner"></span> Finding key moments…</span>:"✨ Smart-pick by phase"}</button>
              <button className="btn sm" onClick={()=>autoSelect(frames,8)}>Spread 8</button>
              <button className="btn sm" onClick={()=>autoSelect(frames,16)}>Spread 16</button>
              <button className="btn sm" onClick={()=>autoSelect(frames,Math.min(MAX_SELECT,frames.length))}>Select max</button>
              <button className="btn sm" onClick={()=>setSelected([])}>Clear</button>
              <button className="btn sm" disabled={poseBusy||!selected.length} onClick={runPoseOnSelected}>{poseBusy?<span><span className="spinner"></span> Detecting…</span>:"Pose overlay on selected"}</button>
              {Object.keys(poseMap).length>0 && <label className="row" style={{margin:0,gap:6}}><input type="checkbox" checked={poseOn} onChange={e=>setPoseOn(e.target.checked)} /> show skeleton</label>}
            </div>
            <div className="filmstrip">
              {frames.map((f,i)=>{
                const sel=selected.includes(i),pose=poseMap[i],img=(poseOn&&pose)?pose.dataUrl:(focusCrops[i]||f).dataUrl,ph=phaseMap[i];
                return <div key={i} className={"frame"+(sel?" sel":"")} onClick={()=>toggle(i)} title={"t="+f.time.toFixed(2)+"s"}>
                  <img src={img} alt={"frame "+i} />
                  <span className="tag t">{f.time.toFixed(1)}s</span>
                  {ph && <span className="tag p">{ph}</span>}
                  {pose&&pose.angles&&(pose.angles.elbow_left||pose.angles.elbow_right) && <span className="tag a" style={{bottom:6,top:"auto"}}>∠{pose.angles.elbow_left||pose.angles.elbow_right}°</span>}
                  {sel && <span className="pick">{selected.indexOf(i)+1}</span>}
                </div>;
              })}
            </div>

            {selected.length>0 &&
              <div style={{marginTop:6}}>
                <div className="hint" style={{marginBottom:6}}>Label each selected frame with the phase it shows — this sharpens the analysis and powers the frame-by-frame review.</div>
                <div className="row" style={{marginBottom:8}}>
                  <button className="btn sm" disabled={!!labelBusy} onClick={autoLabelLocal}>{labelBusy==="local"?<span><span className="spinner"></span> Labeling…</span>:"✨ Auto-label (instant)"}</button>
                  <button className="btn sm" disabled={!!labelBusy} onClick={autoLabelAI}>{labelBusy==="ai"?<span><span className="spinner"></span> Asking AI…</span>:"🤖 Auto-label with AI"}</button>
                  <span className="hint">Fills the phases for you — you can still fix any. Instant = free/offline (freestyle); AI = most accurate (uses your key).</span>
                </div>
                {[...selected].sort((a,b)=>a-b).map(i=>(
                  <div className="selrow" key={i}>
                    <img src={(poseOn&&poseMap[i])?poseMap[i].dataUrl:(focusCrops[i]||frames[i]).dataUrl} alt="" />
                    <div className="meta">
                      <div style={{fontSize:12.5}} className="muted">Frame at {frames[i].time.toFixed(2)}s</div>
                      {poseMap[i]&&poseMap[i].angles &&
                        <div style={{marginTop:3}}>
                          {poseMap[i].angles.elbow_left!=null&&<span className="anglechip">elbow {poseMap[i].angles.elbow_left||poseMap[i].angles.elbow_right}°</span>}
                          {poseMap[i].angles.body_line_vs_horizontal!=null&&<span className="anglechip">body {poseMap[i].angles.body_line_vs_horizontal}°</span>}
                          {poseMap[i].angles.knee_left!=null&&<span className="anglechip">knee {poseMap[i].angles.knee_left}°</span>}
                        </div>}
                    </div>
                    <select value={phaseMap[i]||""} onChange={e=>setPhaseMap(m=>({...m,[i]:e.target.value}))}>
                      <option value="">— phase —</option>
                      {phases.map(p=><option key={p} value={p}>{p}</option>)}
                    </select>
                    <button className="btn sm ghost" onClick={()=>toggle(i)}>✕</button>
                  </div>
                ))}
              </div>}

            {poseAvg &&
              <div className="hintbox" style={{marginTop:10}}>
                Pose averages across analyzed frames:{" "}
                {poseAvg.elbow!=null&&<span className="anglechip">avg elbow {poseAvg.elbow}°</span>}
                {poseAvg.body_line!=null&&<span className="anglechip">avg body-line {poseAvg.body_line}°</span>}
                {poseAvg.knee!=null&&<span className="anglechip">avg knee {poseAvg.knee}°</span>}
                <span className="hint"> — rough estimates from a single-pose model; treat as hints.</span>
              </div>}

            {/* focus on one swimmer (for clips with several kids) */}
            <div style={{marginTop:12,borderTop:"1px solid var(--line)",paddingTop:12}}>
              {!focusOpen ?
                <div className="row">
                  <button className="btn primary" onClick={openFocus}>🎯 Pick which swimmer (for clips with several kids)</button>
                  {(Object.keys(focusCrops).length>0||(trackedCrops&&trackedCrops.length)) && <span className="chip strength">✓ focused on your swimmer</span>}
                </div>
                :
                <div>
                  <div className="row" style={{marginBottom:8}}>
                    <b>Focus on your swimmer</b>
                    {Object.keys(focusCrops).length>0 && <span className="chip strength">✓ applied</span>}
                    <button className="btn sm ghost" style={{marginLeft:"auto"}} onClick={()=>setFocusOpen(false)}>Hide</button>
                  </div>
                  <div className="row" style={{marginBottom:8}}>
                    <label style={{margin:0}}>Reference frame</label>
                    <select value={refIdx==null?"":refIdx} onChange={e=>{setRefIdx(Number(e.target.value));setDetBoxes([]);setPickCenter(null);}}>
                      {[...selected].sort((a,b)=>a-b).map(i=><option key={i} value={i}>{frames[i].time.toFixed(2)}s</option>)}
                    </select>
                    <button className="btn sm" disabled={focusBusy} onClick={detectRef}>{focusBusy?<span><span className="spinner"></span> …</span>:"Detect swimmers"}</button>
                    <button className="btn sm" onClick={startBoxMode}>Draw a box</button>
                    <button className="btn sm ghost" onClick={clearFocus}>Clear</button>
                  </div>
                  <div className="hintbox" style={{marginBottom:8}}>👆 <b>Click directly on your swimmer</b> in the image below to mark them (a target appears). Optionally press <b>Detect swimmers</b> first to snap to a detected box, or <b>Draw a box</b> around them.</div>
                  <canvas ref={focusCanvasRef} onMouseDown={onCanvasDown} onMouseMove={onCanvasMove} onMouseUp={onCanvasUp} onMouseLeave={onCanvasUp}
                    style={{maxWidth:"100%",borderRadius:10,border:"1px solid var(--line)",cursor:focusMode==="box"?"crosshair":"pointer",touchAction:"none"}}></canvas>
                  <div className="row" style={{marginTop:8}}>
                    <button className="btn primary sm" disabled={focusBusy||trackBusy||focusMode==="none"||(focusMode==="auto"&&!pickCenter)||(focusMode==="box"&&!boxRect)} onClick={applyFocus}>
                      {focusBusy?<span><span className="spinner"></span> Working…</span>:"Apply (in-browser)"}</button>
                    <button className="btn sm" disabled={trackBusy||focusBusy||(focusMode==="auto"&&!pickCenter)||(focusMode==="box"&&!boxRect)} onClick={robustTrack}>
                      {trackBusy?<span><span className="spinner"></span> Tracking…</span>:"🎯 Robust AI tracking (helper)"}</button>
                    {trackedCrops&&trackedCrops.length?<span className="chip strength">✓ AI-tracked ({trackedCrops.length})</span>:null}
                  </div>
                  {focusMsg && <div className="hint" style={{marginTop:6}}>{focusMsg}</div>}
                  <div className="hint" style={{marginTop:6}}>Pick your swimmer (Detect → click, or Draw a box), then choose how to follow them:<br/>
                    <b>Apply (in-browser)</b> = fast, offline, follows by nearest-position (can jump if swimmers cross).<br/>
                    <b>Robust AI tracking</b> = sends the clip to the local helper (YOLO + ByteTrack) to keep one identity through crossings, occlusion and turns. Needs the one-time install; falls back to in-browser automatically if it isn’t set up.</div>
                </div>}
            </div>

            <div className="row" style={{marginTop:14}}>
              <button className="btn primary" disabled={analyzing||selected.length<3} onClick={analyze}>
                {analyzing?<span><span className="spinner"></span> Analyzing…</span>:"Analyze stroke →"}</button>
              <span className="hint">Sends {selected.length} still{selected.length===1?"":"s"}{Object.keys(poseMap).length?" + pose angles":""}{cvResult?" + motion metrics":""} to Claude (two compact calls: analysis, then a coaching plan).</span>
            </div>

            {/* local computer-vision motion analysis (whole clip) */}
            <div style={{marginTop:14,borderTop:"1px solid var(--line)",paddingTop:12}}>
              <div className="row">
                <button className="btn" disabled={cvBusy} onClick={runMotionAnalysis}>{cvBusy?<span><span className="spinner"></span> Analyzing motion… {cvPct}%</span>:"📈 Full motion analysis (local CV)"}</button>
                <span className="hint">Runs the open-source pose model across the whole clip to measure body-line, elbow, stroke &amp; kick tempo, and left/right symmetry. Stays on your computer. {focusMode==="box"&&boxRect?"Uses your drawn box.":"Tip: draw a focus box first if several kids are in frame."}</span>
              </div>
              {cvBusy && <div className="progbar" style={{marginTop:8}}><i style={{width:cvPct+"%"}}></i></div>}
              {cvResult &&
                <div style={{marginTop:12}}>
                  <div className="hint" style={{marginBottom:8}}>
                    <span className="chip" style={{background:cvResult.summary.lowConfidence?"rgba(255,186,73,.15)":"rgba(54,214,122,.15)",color:cvResult.summary.lowConfidence?"var(--warn)":"var(--good)",border:"1px solid "+(cvResult.summary.lowConfidence?"rgba(255,186,73,.4)":"rgba(54,214,122,.4)")}}>
                      {cvResult.summary.lowConfidence?"⚠ low confidence":"✓ good tracking"}: {cvResult.summary.usable}/{cvResult.summary.frames} frames clear ({cvResult.summary.coverage}%)</span>
                    {cvResult.summary.lowConfidence?" — the swimmer was hard to see in many frames (splash, distance, or wrong swimmer); treat the numbers below as rough and re-film side-on / closer if you can.":""}
                  </div>
                  <div className="row" style={{gap:8,marginBottom:10}}>
                    {cvResult.summary.strokeRate!=null && <span className="anglechip">~{cvResult.summary.strokeRate} strokes/min</span>}
                    {cvResult.summary.strokeCount!=null && <span className="anglechip">{cvResult.summary.strokeCount} strokes</span>}
                    {cvResult.summary.kickCount!=null && <span className="anglechip">{cvResult.summary.kickCount} kicks (~{cvResult.summary.kickRate}/min)</span>}
                    {cvResult.summary.breathCount!=null && <span className="anglechip">{cvResult.summary.breathCount} breaths</span>}
                    {cvResult.summary.catchElbow!=null && <span className="anglechip">catch elbow ~{cvResult.summary.catchElbow}°</span>}
                    {cvResult.summary.bodyLine && <span className="anglechip">body-line {cvResult.summary.bodyLine.mean}° (range {cvResult.summary.bodyLine.min}–{cvResult.summary.bodyLine.max})</span>}
                    {cvResult.summary.elbow && <span className="anglechip">elbow {cvResult.summary.elbow.mean}° (range {cvResult.summary.elbow.min}–{cvResult.summary.elbow.max})</span>}
                    {cvResult.summary.symmetry && <span className="anglechip">L/R symmetry {cvResult.summary.symmetry.pct}%</span>}
                  </div>
                  {cvResult.phases && cvResult.phases.some(p=>p) &&
                    <div style={{marginBottom:14}}>
                      <div className="hint" style={{marginBottom:4}}>Phase timeline (each cell = a sampled moment):</div>
                      <div style={{display:"flex",height:22,borderRadius:6,overflow:"hidden",border:"1px solid var(--line)"}}>
                        {cvResult.phases.map((p,i)=><div key={i} title={cvResult.times[i]+"s · "+(p||"—")} style={{flex:1,background:phaseColor(p)}}></div>)}
                      </div>
                      <div className="row" style={{gap:6,marginTop:6}}>
                        {[...new Set(cvResult.phases.filter(p=>p))].map(p=>
                          <span key={p} className="hint" style={{display:"inline-flex",alignItems:"center",gap:4}}>
                            <span style={{width:10,height:10,borderRadius:2,background:phaseColor(p),display:"inline-block"}}></span>{p}</span>)}
                      </div>
                    </div>}
                  <div style={{height:190,marginBottom:16}}><canvas ref={cvc1}></canvas></div>
                  <div style={{height:190,marginBottom:16}}><canvas ref={cvc2}></canvas></div>
                  <div style={{height:190}}><canvas ref={cvc3}></canvas></div>
                  <div className="hint" style={{marginTop:8}}>Measured locally from {cvResult.summary.frames} frames with {cvResult.summary.poseModel||"MoveNet"}{trackedCrops&&trackedCrops.length?" on the identity-locked swimmer":cvResult.summary.cropped?" (cropped to your swimmer)":""}. Tempo, breaths &amp; symmetry are rough estimates from a single-camera view — treat as guidance. The phase timeline is tuned for freestyle. These numbers are also sent to the written report to ground it.</div>
                </div>}
            </div>
          </>}
      </div>}

      {/* analyzing skeleton */}
      {analyzing &&
        <div className="card noprint" id="card-analyze">
          <h2><span className="stepn">4</span>Analyzing</h2>
          <div className="stage-msg"><span className="spinner"></span>{stage}</div>
          <div className="skeleton" style={{width:"70%",marginTop:14}}></div>
          <div className="skeleton" style={{width:"95%"}}></div>
          <div className="skeleton" style={{width:"88%"}}></div>
          <div className="skeleton" style={{width:"60%"}}></div>
        </div>}

      {error && <div className="card noprint"><div className="err">{error}</div></div>}

      {/* report */}
      {report &&
        <div ref={refReport} id="card-report">
          <div className="row noprint" style={{justifyContent:"flex-end",marginBottom:-6}}>
            <button className="btn sm" onClick={readAloud}>{speaking?"⏹ Stop":"🔊 Read aloud"}</button>
            <button className="btn sm" onClick={()=>window.print()}>Print / PDF</button>
            <button className="btn sm" onClick={copyReport}>Copy text</button>
            <button className="btn sm" onClick={downloadJSON}>Export JSON</button>
            <button className="btn sm" onClick={saveSession}>Save to tracker</button>
          </div>
          <div className="report-head" style={{marginTop:16}}>
            <h2>{meta.name||"Swimmer"} · age {meta.age} · {STROKES.find(s=>s.id===meta.stroke)?.label}</h2>
            <p>{report.summary}</p>
            {report.one_thing &&
              <div className="onething"><span className="onething-tag">⭐ If you fix one thing</span> {report.one_thing}</div>}
            {Array.isArray(report.strengths)&&report.strengths.length>0 &&
              <div style={{marginTop:10}}>
                <div className="muted" style={{fontSize:12.5,marginBottom:4}}>What's already working — keep doing it:</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {report.strengths.map((s,i)=><span className="chip strength" key={i} style={{fontSize:12}}>✓ {s}</span>)}
                </div>
              </div>}
          </div>

          {Array.isArray(report.dimensions)&&report.dimensions.length>0 &&
            <Collapse title="📊 Scorecard" sub="rating per area">
              {report.dimensions.map((d,i)=>{
                const cls=ratingClass(d.rating);
                const hasScore=typeof d.score==="number"&&d.score>0;
                const pct=hasScore?Math.max(4,Math.min(100,d.score)):{strength:100,developing:66,needs:33,na:18}[cls];
                const col={strength:"var(--good)",developing:"var(--dev)",needs:"var(--needs)",na:"var(--na)"}[cls];
                return <div key={i} style={{display:"grid",gridTemplateColumns:"minmax(96px,30%) 1fr auto auto",gap:8,alignItems:"center",margin:"7px 0"}}>
                  <div style={{fontSize:13}}>{d.name}</div>
                  <div style={{background:"var(--panel3)",borderRadius:6,height:14,overflow:"hidden",border:"1px solid var(--line)"}}>
                    <div style={{width:pct+"%",height:"100%",background:col}}></div>
                  </div>
                  {hasScore?<span className="muted" style={{fontSize:11.5,minWidth:30,textAlign:"right"}}>{d.score}</span>:<span></span>}
                  <span className={"chip "+cls} style={{fontSize:11}}>{ratingIcon(d.rating)} {d.rating}</span>
                </div>;
              })}
              {typeof report.dimensions.find(d=>typeof d.score==="number"&&d.score>0)!=="undefined" &&
                <div className="muted" style={{textAlign:"right",fontSize:12,marginTop:6}}>
                  Overall {Math.round(report.dimensions.filter(d=>typeof d.score==="number"&&d.score>0).reduce((a,d)=>a+d.score,0)/Math.max(1,report.dimensions.filter(d=>typeof d.score==="number"&&d.score>0).length))}/100
                </div>}
              <div className="hint" style={{marginTop:8}}>Longer bar = stronger (0–100). ✓ strength · ↗ developing · ! needs work · ? can’t tell.</div>
            </Collapse>}

          {Array.isArray(report.top_priorities)&&report.top_priorities.length>0 &&
            <Collapse title="🎯 Top priorities" sub="biggest wins first">
              {report.top_priorities.map((p,i)=>(
                <div className="prio" key={i}>
                  <div style={{fontWeight:700}}>{i+1}. {p.priority}</div>
                  <div className="muted" style={{margin:"4px 0 6px",fontSize:13.5}}>{p.why_it_matters}</div>
                  {p.cue && <div className="cue">🗣️ Say it poolside: “{p.cue}”</div>}
                  {(p.drills||[]).map((d,j)=>(
                    <div className="drill" key={j}>
                      <b>{d.name}.</b> {d.how}
                      {d.purpose && <div className="drillmeta"><b>Purpose:</b> {d.purpose}</div>}
                      {d.dose && <div className="drillmeta"><b>Dose:</b> {d.dose}</div>}
                      {d.success_check && <div className="drillmeta"><b>Working when:</b> {d.success_check}</div>}
                      {d.progression && <div className="drillmeta"><b>Level up:</b> {d.progression}</div>}
                    </div>))}
                </div>))}
            </Collapse>}

          {Array.isArray(report.weekly_focus)&&report.weekly_focus.length>0 &&
            <Collapse title="🗓️ Week-by-week focus" sub="one thing at a time">
              {report.weekly_focus.map((w,i)=>(
                <div className="drill" key={i}>
                  <b>{w.week}:</b> {w.focus}{w.main_drill?<div className="drillmeta"><b>Main drill:</b> {w.main_drill}</div>:null}
                </div>))}
            </Collapse>}

          {report.practice_plan && (report.practice_plan.focus||(report.practice_plan.sets||[]).length>0) &&
            <Collapse title="🏊 Practice plan">
              {report.practice_plan.focus && <p style={{marginTop:0}} className="muted"><b style={{color:"var(--ink)"}}>Focus:</b> {report.practice_plan.focus}</p>}
              {(report.practice_plan.sets||[]).map((s,i)=><div className="drill" key={i}><b>{s.name}.</b> {s.detail}</div>)}
            </Collapse>}

          {Array.isArray(report.periodization)&&report.periodization.length>0 &&
            <Collapse title="📅 Training blocks (build-up)" sub="technique → build → sharpen" open={false}>
              {report.periodization.map((b,i)=>(
                <div className="drill" key={i}>
                  <b>{b.block}{b.weeks?" · "+b.weeks:""}.</b> {b.focus}{b.sample?<div className="drillmeta"><b>Emphasis:</b> {b.sample}</div>:null}
                </div>))}
            </Collapse>}

          {Array.isArray(report.dryland)&&report.dryland.length>0 &&
            <Collapse title="🤸 Dryland (out of the water)" sub="bodyweight, kid-safe" open={false}>
              {report.dryland.map((d,i)=>(
                <div className="drill" key={i}><b>{d.name}.</b> {d.how}{d.dose?<div className="drillmeta"><b>Dose:</b> {d.dose}</div>:null}</div>))}
            </Collapse>}

          {Array.isArray(report.games)&&report.games.length>0 &&
            <Collapse title="🎮 Fun games & challenges" open={false}>
              <ul style={{margin:"4px 0 0",paddingLeft:20}}>
                {report.games.map((g,i)=><li key={i} style={{fontSize:13.5,margin:"4px 0"}}>{g}</li>)}
              </ul>
            </Collapse>}

          {Array.isArray(report.parent_tips)&&report.parent_tips.length>0 &&
            <Collapse title="👪 Tips for parents" sub="help without over-coaching" open={false}>
              <ul style={{margin:"4px 0 0",paddingLeft:20}}>
                {report.parent_tips.map((t,i)=><li key={i} style={{fontSize:13.5,margin:"4px 0"}}>{t}</li>)}
              </ul>
            </Collapse>}

          {Array.isArray(report.dimensions)&&report.dimensions.length>0 &&
            <Collapse title="📋 Dimension-by-dimension">
              {report.dimensions.map((d,i)=>(
                <div className="dim" key={i}>
                  <h4><span>{d.name}</span><span className={"chip "+ratingClass(d.rating)}>{ratingIcon(d.rating)} {d.rating}</span></h4>
                  <div style={{fontSize:13.5}}>{d.observation}</div>
                  {d.root_cause && <div className="muted" style={{marginTop:5,fontSize:13}}><b>Root cause:</b> {d.root_cause}</div>}
                  {d.improve && <div className="muted" style={{marginTop:6,fontSize:13.5}}><b>Try:</b> {d.improve}</div>}
                  {d.cue && <div className="cue" style={{marginTop:6}}>🗣️ “{d.cue}”</div>}
                </div>))}
            </Collapse>}

          {selected.some(i=>phaseMap[i]) &&
            <Collapse title="🔍 Frame-by-frame review" open={false}>
              <div className="hint" style={{marginBottom:8}}>Your labeled frames next to the ideal position for that phase.</div>
              {[...selected].sort((a,b)=>a-b).filter(i=>phaseMap[i]).map(i=>{
                const ref=(REFERENCE[meta.stroke]||[]).find(r=>r.phase===phaseMap[i]);
                const ang=poseMap[i]&&poseMap[i].angles;
                return <div className="review" key={i}>
                  <img src={(poseMap[i]?poseMap[i].dataUrl:(focusCrops[i]||frames[i]).dataUrl)} alt="" />
                  <div>
                    <div style={{fontWeight:700,marginBottom:4}}>{phaseMap[i]} <span className="muted" style={{fontWeight:400}}>· {frames[i].time.toFixed(2)}s</span></div>
                    <div style={{fontSize:13.5}}><b className="muted">Ideal:</b> {ref?ref.ideal:"—"}</div>
                    {ang &&
                      <div style={{marginTop:6}}>
                        {ang.elbow_left!=null&&<span className="anglechip">elbow {ang.elbow_left||ang.elbow_right}°</span>}
                        {ang.body_line_vs_horizontal!=null&&<span className="anglechip">body-line {ang.body_line_vs_horizontal}°</span>}
                        {ang.knee_left!=null&&<span className="anglechip">knee {ang.knee_left}°</span>}
                      </div>}
                  </div>
                </div>;
              })}
            </Collapse>}

          {(report.race_model||report.race_strategy) &&
            <Collapse title="🏁 Race model & pacing" sub="read from the times">
              {report.race_model && <p style={{marginTop:0}}>{report.race_model}</p>}
              {report.race_strategy && <div className="cue" style={{fontStyle:"normal",marginTop:8}}><b>Race plan:</b> {report.race_strategy}</div>}
            </Collapse>}

          {report.performance_note &&
            <Collapse title="⏱️ Performance note"><p style={{margin:0}}>{report.performance_note}</p></Collapse>}

          <Collapse title="🎥 Next steps & caveats">
            {report.film_next && <p style={{marginTop:0}}><b className="muted">Film/swim next:</b> {report.film_next}</p>}
            {report.caveats && <div className="hint"><b>Caveats:</b> {report.caveats} This is coaching guidance, not medical advice — confirm anything time-based with the swimmer's own coach.</div>}
          </Collapse>
        </div>}

      {/* motion review */}
      {frames.length>0 && (()=>{
        const list=selected.length?[...selected].sort((a,b)=>a-b):frames.map((_,i)=>i);
        if(!list.length)return null;
        const idx=Math.min(reviewIdx,list.length-1); const fi=list[idx];
        const pm=poseMap[fi]; const imgUrl=(poseOn&&pm)?pm.dataUrl:(focusCrops[fi]||frames[fi]).dataUrl;
        const ang=pm&&pm.angles;
        return (
        <div className="card noprint" id="card-review">
          <h2><span className="stepn idle">🎬</span>Motion review<span className="ctitle-r">{idx+1} / {list.length}</span></h2>
          <div className="reviewer">
            <img src={imgUrl} alt="" />
            <div className="rv-tags">
              <span className="rv-time">{frames[fi].time.toFixed(2)}s</span>
              {phaseMap[fi] && <span className="rv-phase">{phaseMap[fi]}</span>}
            </div>
          </div>
          <div className="row" style={{marginTop:10}}>
            <button className="btn sm" onClick={()=>{setReviewPlaying(false);setReviewIdx(x=>Math.max(0,x-1));}}>‹ Prev</button>
            <button className="btn sm primary" onClick={()=>setReviewPlaying(p=>!p)}>{reviewPlaying?"❚❚ Pause":"▶ Play"}</button>
            <button className="btn sm" onClick={()=>{setReviewPlaying(false);setReviewIdx(x=>Math.min(list.length-1,x+1));}}>Next ›</button>
            <input type="range" min="0" max={list.length-1} value={idx} onChange={e=>{setReviewPlaying(false);setReviewIdx(Number(e.target.value));}} style={{flex:1,minWidth:120}} />
            {Object.keys(poseMap).length>0 && <label className="row" style={{gap:6,margin:0}}><input type="checkbox" checked={poseOn} onChange={e=>setPoseOn(e.target.checked)} /> skeleton</label>}
          </div>
          {ang &&
            <div style={{marginTop:8}}>
              {(ang.elbow_left||ang.elbow_right)&&<span className="anglechip">elbow {ang.elbow_left||ang.elbow_right}°</span>}
              {ang.body_line_vs_horizontal!=null&&<span className="anglechip">body-line {ang.body_line_vs_horizontal}°</span>}
              {ang.knee_left!=null&&<span className="anglechip">knee {ang.knee_left}°</span>}
            </div>}
          <div className="hint" style={{marginTop:6}}>Scrub or play through your frames. Run “Pose overlay” in step 3, then tick “skeleton” to see the joints drawn on each frame. Select key frames for a focused review.</div>
        </div>);
      })()}

      {/* knowledge hub: reference + faults + drills + glossary (tabbed, collapsible) */}
      <details className="card noprint khub" id="card-knowledge">
        <summary className="khub-sum">📚 Coaching reference &amp; glossary <span className="muted" style={{fontWeight:400,fontSize:12.5}}>— positions, faults, drills &amp; terms</span></summary>
        <div className="tabbar">
          {[["ref","Ideal positions"],["faults","Faults & fixes"],["drills","Drills"],["gloss","Glossary"]].map(t=>(
            <button key={t[0]} className={"ktab"+(refTab===t[0]?" on":"")} onClick={()=>setRefTab(t[0])}>{t[1]}</button>))}
        </div>
        {refTab!=="gloss" &&
          <div className="row" style={{margin:"12px 0 2px"}}>
            <label style={{margin:0}}>Stroke</label>
            <select value={refStroke||meta.stroke} onChange={e=>setRefStroke(e.target.value)}>{STROKES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select>
            <span className="muted" style={{fontSize:12}}>showing {STROKES.find(s=>s.id===(refStroke||meta.stroke))?.label}</span>
          </div>}
        {refTab==="ref" &&
          <div className="grid g2" style={{marginTop:8}}>
            {(REFERENCE[refStroke||meta.stroke]||REFERENCE.freestyle).map((r,i)=>(
              <div className="dim" key={i}><h4><span>{r.phase}</span></h4><div style={{fontSize:13.5}}>{r.ideal}</div></div>))}
          </div>}
        {refTab==="faults" &&
          <div style={{marginTop:8}}>
            {(FAULTS[refStroke||meta.stroke]||FAULTS.freestyle).map((f,i)=>(
              <div className="dim" key={i}>
                <h4><span>⚠ {f.fault}</span></h4>
                <div style={{fontSize:13.5}}><b className="muted">Likely cause:</b> {f.cause}</div>
                <div style={{fontSize:13.5,marginTop:3}}><b className="muted">Fix:</b> {f.fix}</div>
                {f.cue && <div className="cue" style={{marginTop:5}}>🗣️ “{f.cue}”</div>}
              </div>))}
          </div>}
        {refTab==="drills" &&
          <div className="grid g2" style={{marginTop:8}}>
            {(DRILLS[refStroke||meta.stroke]||DRILLS.freestyle).map((d,i)=>(
              <div className="drill" key={i}><b>{d.name}.</b> {d.how}{d.purpose?<div className="drillmeta"><b>Trains:</b> {d.purpose}</div>:null}</div>))}
          </div>}
        {refTab==="gloss" &&
          <div style={{marginTop:10}}>
            <input type="text" placeholder="Search terms…" value={glossQ} onChange={e=>setGlossQ(e.target.value)} style={{width:"100%",maxWidth:320,marginBottom:10,boxSizing:"border-box"}} />
            <div className="grid g2">
              {GLOSSARY.filter(g=>{const q=glossQ.trim().toLowerCase();return !q||(g.term+" "+g.def).toLowerCase().includes(q);}).map((g,i)=>(
                <div className="dim" key={i}><h4><span>{g.term}</span></h4><div style={{fontSize:13.5}}>{g.def}</div></div>))}
            </div>
          </div>}
      </details>

      {/* progress tracker */}
      {sessions.length>0 &&
        <div className="card noprint">
          <div className="row" style={{marginBottom:6}}>
            <h2 style={{margin:0}}>📈 Progress over time</h2>
            <span className="muted" style={{fontSize:12}}>{shownSessions.length} session{shownSessions.length===1?"":"s"}{activeProfileObj?" · "+activeProfileObj.name:""}</span>
            {activeProfileObj && <button className="btn sm ghost" onClick={()=>setHistScope(s=>s==="active"?"all":"active")}>{histScope==="active"?"Show all swimmers":"Show "+activeProfileObj.name+" only"}</button>}
            <button className="btn sm ghost" style={{marginLeft:"auto"}} onClick={clearHistory}>Clear history</button>
          </div>
          {shownSessions.length>=2
            ? <div style={{height:240,marginBottom:12}}><canvas ref={histRef}></canvas></div>
            : <div className="hint" style={{marginBottom:10}}>Save another session (different day or meet) to see improvement charted here.</div>}
          <div style={{overflowX:"auto"}}>
            <table className="sessions cardify"><thead><tr><th>Date</th><th>Swimmer</th><th>Stroke</th><th>50</th><th>100</th><th>Stroke/min</th><th>Body-line°</th><th>Sym%</th><th>Catch°</th><th>Top priority</th></tr></thead>
              <tbody>{shownSessions.map((s,i)=><tr key={i}><td data-label="Date">{s.date||s.when}</td><td data-label="Swimmer">{s.swimmer||"—"}</td><td data-label="Stroke">{s.stroke}</td><td data-label="50">{s.t50||"—"}</td><td data-label="100">{s.t100||"—"}</td><td data-label="Stroke/min">{s.strokeRate!=null?s.strokeRate:"—"}</td><td data-label="Body-line°">{s.bodyLine!=null?s.bodyLine:"—"}</td><td data-label="Sym%">{s.symmetry!=null?s.symmetry:"—"}</td><td data-label="Catch°">{s.catchElbow!=null?s.catchElbow:"—"}</td><td data-label="Top priority">{s.top}</td></tr>)}</tbody></table>
          </div>
          {shownSessions.length>=2 &&
            <div style={{marginTop:14,borderTop:"1px solid var(--line)",paddingTop:12}}>
              <label>Compare two sessions</label>
              <div className="row" style={{marginTop:4}}>
                <select value={cmpA} onChange={e=>setCmpA(e.target.value)}><option value="">— session A —</option>{shownSessions.map((s,i)=><option key={i} value={i}>{(s.date||s.when)+" · "+(s.swimmer||"")+" · "+s.stroke}</option>)}</select>
                <select value={cmpB} onChange={e=>setCmpB(e.target.value)}><option value="">— session B —</option>{shownSessions.map((s,i)=><option key={i} value={i}>{(s.date||s.when)+" · "+(s.swimmer||"")+" · "+s.stroke}</option>)}</select>
              </div>
              {cmpA!==""&&cmpB!==""&&shownSessions[cmpA]&&shownSessions[cmpB] &&
                <table className="sessions" style={{marginTop:8}}>
                  <thead><tr><th>Metric</th><th>{shownSessions[cmpA].date||shownSessions[cmpA].when}</th><th>{shownSessions[cmpB].date||shownSessions[cmpB].when}</th></tr></thead>
                  <tbody>
                    {[["50 time","t50"],["100 time","t100"],["Stroke rate /min","strokeRate"],["Body-line °","bodyLine"],["Symmetry %","symmetry"],["Catch elbow °","catchElbow"]].map((m,i)=>{
                      const a=shownSessions[cmpA][m[1]],b=shownSessions[cmpB][m[1]];
                      return <tr key={i}><td>{m[0]}</td><td>{a!=null&&a!==""?a:"—"}</td><td>{b!=null&&b!==""?b:"—"}</td></tr>;
                    })}
                  </tbody>
                </table>}
            </div>}
          <div className="hint" style={{marginTop:6}}>Saved on your computer ({"swimlens_history.json"}) when the launcher is running, so it persists across sessions. Tip: run a clip each meet to watch the numbers trend.</div>
        </div>}

      <div className="hint noprint" style={{textAlign:"center",marginTop:24}}>Swim Coach AI · frames stay in your browser · analysis from stills — confirm timing with a live coach.</div>
      </div>{/* .main */}
      </div>{/* .layout */}
    </div>
  );
}
